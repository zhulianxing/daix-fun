<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#050507;--bg-2:#0A0A0F;--card:#12121A;--card-hover:#1A1A25;
  --border:#222230;--border-glow:#3A3A50;
  --text:#F8F8FC;--text-2:#B0B0C0;--text-3:#707088;
  --accent:#8B5CF6;--accent-2:#06B6D4;--accent-3:#EC4899;
  --green:#10B981;--red:#F43F5E;--gold:#F59E0B;
  --radius-xl:24px;--radius-lg:16px;--radius-md:12px;--radius-sm:8px;
  --glow-purple:0 0 40px rgba(139,92,246,.3);
  --gradient-hero:linear-gradient(135deg,#8B5CF6 0%,#06B6D4 50%,#EC4899 100%);
  --gradient-card:linear-gradient(180deg,rgba(139,92,246,.08) 0%,transparent 100%);
}
html{scroll-behavior:smooth}
body{font-family:'Inter',-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--text);line-height:1.7;overflow-x:hidden}
a{color:inherit;text-decoration:none}

.bg-grid{position:fixed;inset:0;width:100vw;max-width:100vw;z-index:-2;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:60px 60px;opacity:.3}
.bg-gradient{position:fixed;inset:0;width:100vw;max-width:100vw;z-index:-1;background:radial-gradient(ellipse 80% 50% at 50% -20%,rgba(139,92,246,.15),transparent),radial-gradient(ellipse 60% 40% at 80% 50%,rgba(6,182,212,.1),transparent),radial-gradient(ellipse 50% 30% at 20% 80%,rgba(236,72,153,.08),transparent)}

.nav{position:fixed;top:0;left:0;right:auto;width:100vw;max-width:100vw;z-index:100;height:64px;background:rgba(5,5,7,.8);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:16px;padding:0 32px;overflow:visible}
.nav-links{display:flex;gap:32px;font-size:15px;font-weight:500;color:var(--text-2)}
.nav-links a{position:relative;padding:8px 0;transition:color .3s}
.nav-links a:hover{color:var(--text)}
.nav-links a::after{content:'';position:absolute;bottom:0;left:0;width:0;height:2px;background:var(--gradient-hero);transition:width .3s}
.nav-links a:hover::after{width:100%}
.nav-cta{display:flex;gap:12px;align-items:center;flex-shrink:0}

.btn{display:inline-flex;align-items:center;gap:8px;padding:12px 24px;border-radius:var(--radius-md);font-size:14px;font-weight:600;font-family:inherit;cursor:pointer;border:none;transition:all .3s;position:relative;overflow:hidden}
.btn-primary{background:var(--gradient-hero);color:#fff;box-shadow:var(--glow-purple)}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 40px rgba(139,92,246,.4)}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--text)}
.btn-outline:hover{background:var(--card);border-color:var(--accent)}
.btn-ghost{background:var(--card);color:var(--text);border:1px solid var(--border)}
.btn-ghost:hover{background:var(--card-hover)}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none}
.btn-small{padding:8px 16px;font-size:13px}

.mode-banner{padding:8px 20px;text-align:center;font-size:13px;color:var(--gold);background:rgba(245,158,11,.06);border-bottom:1px solid rgba(245,158,11,.15)}

.hero{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:80px 24px 60px;position:relative;overflow:hidden}
.hero-glow{position:absolute;width:600px;height:600px;background:radial-gradient(circle,rgba(139,92,246,.2) 0%,transparent 60%);filter:blur(60px);animation:glow-pulse 4s ease-in-out infinite}
.hero-glow-2{position:absolute;width:400px;height:400px;background:radial-gradient(circle,rgba(6,182,212,.15) 0%,transparent 60%);filter:blur(40px);animation:glow-pulse 4s ease-in-out infinite 2s}
@keyframes glow-pulse{0%,100%{opacity:.6;transform:scale(1)}50%{opacity:.8;transform:scale(1.1)}}
.hero-badge{display:inline-flex;align-items:center;gap:8px;padding:8px 20px;background:var(--card);border:1px solid var(--border);border-radius:100px;font-size:14px;color:var(--accent-2);margin-bottom:32px;animation:fade-in .6s ease-out}
.hero-badge::before{content:'';width:8px;height:8px;background:var(--accent-2);border-radius:50%;animation:blink 2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.hero h1{font-size:clamp(48px,8vw,80px);font-weight:900;letter-spacing:-3px;line-height:1.1;margin-bottom:24px;background:var(--gradient-hero);-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:fade-in .8s ease-out .2s both}
.hero p{font-size:20px;color:var(--text-2);max-width:700px;margin:0 auto 40px;line-height:1.8;animation:fade-in .8s ease-out .4s both}
.hero-actions{display:flex;gap:16px;flex-wrap:wrap;justify-content:center;animation:fade-in .8s ease-out .6s both}
@keyframes fade-in{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

.container{max-width:1200px;margin:0 auto;padding:0 32px}
.section{padding:100px 0}
.section-header{text-align:center;margin-bottom:60px}
.section-title{font-size:40px;font-weight:800;letter-spacing:-1px;margin-bottom:16px;background:var(--gradient-hero);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.section-sub{font-size:18px;color:var(--text-2);max-width:600px;margin:0 auto}

.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:24px}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-lg);padding:32px;text-align:center;position:relative;overflow:hidden;transition:all .3s}
.stat-card:hover{background:var(--card-hover);border-color:var(--accent);transform:translateY(-4px)}
.stat-num{font-size:48px;font-weight:900;background:var(--gradient-hero);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.stat-label{font-size:14px;color:var(--text-3);margin-top:8px;font-weight:500}

.flow-section{display:flex;align-items:center;justify-content:center;gap:24px;flex-wrap:wrap;padding:60px 0}
.flow-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-lg);padding:28px 36px;text-align:center;min-width:160px;transition:all .3s}
.flow-card:hover{border-color:var(--accent);transform:translateY(-8px);box-shadow:var(--glow-purple)}
.flow-card .icon{font-size:40px;margin-bottom:12px}
.flow-card .title{font-size:17px;font-weight:700}
.flow-card .desc{font-size:13px;color:var(--text-3);margin-top:8px}
.flow-arrow{font-size:32px;color:var(--accent);opacity:.6}

.split-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:20px;margin-top:48px}
.split-card{text-align:center;padding:32px 24px;background:var(--card);border:1px solid var(--border);border-radius:var(--radius-lg);transition:all .3s}
.split-card:hover{border-color:var(--accent);transform:scale(1.02)}
.split-pct{font-size:36px;font-weight:900}
.split-label{font-size:14px;color:var(--text-2);margin-top:12px;line-height:1.5}

.apps-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(min(100%,320px),1fr));gap:24px}
.app-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-lg);padding:24px;transition:all .4s;position:relative}
.app-card:hover{background:var(--card-hover);border-color:var(--accent);transform:translateY(-8px);box-shadow:var(--glow-purple)}
.app-card .header{display:flex;align-items:center;gap:16px;margin-bottom:16px}
.app-card .icon{width:56px;height:56px;background:linear-gradient(135deg,var(--accent),var(--accent-2));border-radius:var(--radius-md);display:flex;align-items:center;justify-content:center;font-size:28px;flex-shrink:0}
.app-card .name{font-size:18px;font-weight:700}
.app-card .pkg{font-size:13px;color:var(--text-3)}
.app-card .desc{font-size:14px;color:var(--text-2);margin:12px 0;line-height:1.6}
.app-card .price{font-size:24px;font-weight:800;color:var(--accent-2)}
.app-card .dev{font-size:13px;color:var(--text-3);margin-top:8px}
.app-card .badge{display:inline-block;padding:2px 8px;border-radius:100px;font-size:11px;margin-top:8px}
.app-card .badge.live{background:rgba(16,185,129,.15);color:var(--green)}
.app-card .badge.demo{background:rgba(245,158,11,.15);color:var(--gold)}
.app-card .actions{margin-top:16px}

.license-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-lg);padding:20px;margin:16px 0;display:flex;align-items:center;gap:20px;transition:all .3s}
.license-card:hover{border-color:var(--accent)}
.license-icon{width:56px;height:56px;border-radius:var(--radius-md);background:var(--gradient-hero);display:flex;align-items:center;justify-content:center;font-size:28px;flex-shrink:0}
.license-info{flex:1}
.license-info .title{font-size:16px;font-weight:600}
.license-info .meta{font-size:13px;color:var(--text-3);margin-top:4px}

.form-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-xl);padding:36px;transition:all .3s}
.form-card:hover{border-color:var(--border-glow)}
.form-card h3{font-size:22px;font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:12px}
.form-card p{font-size:15px;color:var(--text-2);margin-bottom:24px}
.form-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:32px}
.form-group{margin-bottom:20px}
.form-group label{display:block;font-size:14px;font-weight:600;color:var(--text-2);margin-bottom:8px}
.form-group input,.form-group textarea{width:100%;padding:14px 18px;background:var(--bg-2);border:1px solid var(--border);border-radius:var(--radius-md);color:var(--text);font-size:15px;font-family:inherit;transition:all .3s}
.form-group input:focus,.form-group textarea:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(139,92,246,.2)}

.phase-marker{width:56px;height:56px;background:var(--gradient-hero);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:900;flex-shrink:0;position:relative}
.phase-marker::after{content:'';position:absolute;bottom:-32px;left:50%;width:2px;height:32px;background:var(--border)}
.phase-content{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-lg);padding:28px;flex:1}
.phase-content h4{font-size:18px;font-weight:700;margin-bottom:8px}
.phase-content p{font-size:15px;color:var(--text-2);line-height:1.6}
.phase-status{display:inline-flex;padding:4px 12px;border-radius:100px;font-size:12px;font-weight:600;margin-top:12px}
.phase-status.done{background:rgba(16,185,129,.2);color:var(--green)}
.phase-status.active{background:rgba(139,92,246,.2);color:var(--accent)}
.phase-status.pending{background:rgba(112,112,136,.2);color:var(--text-3)}

.wallet-bar{position:fixed;bottom:32px;right:32px;z-index:200;display:flex;align-items:center;gap:16px;padding:16px 24px;background:var(--card);border:1px solid var(--border);border-radius:var(--radius-lg);backdrop-filter:blur(20px);box-shadow:0 12px 40px rgba(0,0,0,.5);animation:slide-up .5s ease-out}
@keyframes slide-up{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.wallet-status{font-size:14px;color:var(--text-2);font-weight:500}
.wallet-status.connected{color:var(--green)}
.wallet-status.connected::before{content:'';display:inline-block;width:10px;height:10px;background:var(--green);border-radius:50%;margin-right:8px;animation:blink 2s infinite}

.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);backdrop-filter:blur(8px);z-index:300;display:none;align-items:center;justify-content:center;padding:24px}
.modal-overlay.active{display:flex;animation:fade-in .3s}
.modal{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-xl);padding:36px;max-width:520px;width:100%;max-height:85vh;overflow-y:auto;animation:scale-in .3s}
@keyframes scale-in{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}
.modal h2{font-size:24px;font-weight:700;margin-bottom:24px}
.tx-status{padding:16px 20px;border-radius:var(--radius-md);font-size:15px;margin:16px 0}
.tx-status.pending{background:rgba(139,92,246,.15);border:1px solid var(--accent);color:var(--accent-2)}
.tx-status.success{background:rgba(16,185,129,.15);border:1px solid var(--green);color:var(--green)}
.tx-status.error{background:rgba(244,63,94,.15);border:1px solid var(--red);color:var(--red)}

.footer{text-align:center;padding:60px 0;border-top:1px solid var(--border);margin-top:100px}
.footer-logo{font-size:20px;font-weight:800;background:var(--gradient-hero);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:12px}
.footer-links{display:flex;gap:24px;justify-content:center;margin:24px 0;font-size:14px;color:var(--text-2)}
.footer-links a:hover{color:var(--text)}
.footer-copy{font-size:13px;color:var(--text-3)}

.compare-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:40px}
.compare-card{border-radius:var(--radius-xl);padding:36px;border:1px solid var(--border)}
.compare-card.negative{border-color:rgba(244,63,94,.3);background:rgba(244,63,94,.03)}
.compare-card.positive{border-color:rgba(16,185,129,.3);background:rgba(16,185,129,.03)}
.compare-card h3{font-size:22px;font-weight:700;margin-bottom:20px}
.compare-card ul{margin:0;padding-left:24px;color:var(--text-2);line-height:2.2}

.toast{position:fixed;top:80px;left:50%;transform:translateX(-50%);padding:12px 24px;background:var(--card);border:1px solid var(--accent);border-radius:var(--radius-md);z-index:400;font-size:14px;animation:fade-in .3s}

/* Language Switcher */
.nav-mobile-toggle{display:none;align-items:center;justify-content:center;width:40px;height:40px;background:none;border:1px solid transparent;border-radius:var(--radius-sm);color:var(--text);font-size:24px;cursor:pointer;padding:0;flex-shrink:0}
.nav-mobile-toggle:hover{background:var(--card);border-color:var(--border)}
.nav-mobile-menu{display:none;position:fixed;top:64px;left:0;right:0;background:rgba(5,5,7,.95);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);flex-direction:column;padding:20px;gap:16px;z-index:99}
.nav-mobile-menu.open{display:none}
.nav-mobile-menu a{padding:12px 0;font-size:16px;color:var(--text-2);border-bottom:1px solid var(--border)}
.nav-mobile-menu a:hover{color:var(--text)}
.lang-switcher{position:relative;display:inline-block;flex-shrink:0}
.lang-btn{display:flex;align-items:center;gap:6px;padding:8px 14px;background:var(--card);border:1px solid var(--border);border-radius:var(--radius-md);color:var(--text-2);font-size:13px;font-weight:500;cursor:pointer;transition:all .3s;font-family:inherit}
.lang-btn:hover{border-color:var(--accent);color:var(--text)}
.lang-btn .globe{font-size:16px}
.lang-dropdown{position:absolute;top:100%;right:0;margin-top:8px;background:var(--card);border:1px solid var(--border);border-radius:var(--radius-md);overflow:hidden;min-width:140px;display:none;z-index:300;box-shadow:0 8px 32px rgba(0,0,0,.5)}
.lang-dropdown.active{display:block;animation:fade-in .2s}
.lang-option{display:flex;align-items:center;gap:10px;padding:10px 16px;cursor:pointer;font-size:14px;color:var(--text-2);transition:all .2s}
.lang-option:hover{background:var(--card-hover);color:var(--text)}
.lang-option.active{color:var(--accent)}
.lang-option .flag{font-size:18px}

.powered-by{display:inline-flex;align-items:center;gap:6px;font-size:12px;color:var(--text-3);margin-top:8px}
.powered-by .polygon-logo{width:14px;height:14px;background:var(--accent-2);border-radius:50%;display:inline-block}

@media(max-width:1024px){.stats-grid{grid-template-columns:repeat(2,1fr)}.split-grid{grid-template-columns:repeat(2,1fr)}.compare-grid{grid-template-columns:1fr}}
@media(max-width:768px){
.nav{padding:0 14px;gap:8px}.nav-links{display:none}.container{padding:0 20px}
.nav-cta{margin-left:auto;display:grid;grid-template-columns:58px 40px 40px;align-items:center;gap:6px;width:150px}.lang-switcher{width:58px}.lang-btn{width:58px;height:40px;padding:8px 10px;justify-content:center}.lang-btn .globe{font-size:15px}
#btn-connect{width:40px;height:40px;padding:0;justify-content:center;font-size:0;flex-shrink:0}
#btn-connect{max-width:40px;min-width:40px;overflow:hidden;white-space:nowrap}
#btn-connect::before{content:'🔗';font-size:17px;line-height:1}
#btn-connect.connected::before{content:'✓';font-size:18px}
.nav-mobile-toggle{display:flex!important}.nav-mobile-menu.open{display:flex!important}
.section{padding:60px 0}.section-title{font-size:32px}
.stats-grid,.split-grid{grid-template-columns:1fr}
.flow-section{flex-direction:column}.flow-arrow{transform:rotate(90deg)}
.hero h1{font-size:36px}.hero p{font-size:16px}
.wallet-bar{left:20px;right:20px;bottom:20px;justify-content:center;padding:12px 16px}
}
@media(max-width:480px){
.nav{padding:0 12px}.lang-btn{gap:4px;padding:8px}.lang-btn span:last-child{display:none}
}
</style>
</head>
<body>

<div class="bg-grid"></div>
<div class="bg-gradient"></div>

<!-- Mode Banner -->
<div class="mode-banner" id="modeBanner" style="display:none">
  <span id="mode-banner-text"></span>
</div>

<nav class="nav">
<div class="nav-links">

</div>

</button>

<div class="lang-option" onclick="switchLang('zh')"><span class="flag">🇨🇳</span> 中文</div>

</div>
</div>

</div>
</nav>
<div class="nav-mobile-menu" id="nav-mobile-menu">

  t(key) {
    return (this.dicts[this.lang] && this.dicts[this.lang][key]) || this.dicts.en[key] || key;
  },
  // App names bilingual mapping per language
  appName(zhName) {
    const map = {
      en: {
        'VIP迎宾': 'VIP Reception',
        '走失守护': 'Person Finder',
        '商铺防损': 'Shop Security',
        '刷脸考勤': 'Attendance Guard',
        '客流统计': 'Traffic Analytics',
        '高尔夫测距': 'Golf Rangefinder',
        '跌倒守护': 'Fall Detection',
        '长者守护': 'Elder Guard',
        '单点抓拍': 'Pedestrian Capture'
      },
      ja: {
        'VIP迎宾': 'VIP受付',
        '走失守护': '人探しガード',
        '商铺防损': '店舗セキュリティ',
        '刷脸考勤': '勤怠ガード',
        '客流统计': '客流分析',
        '高尔夫测距': 'ゴルフ距離計',
        '跌倒守护': '転倒検知',
        '长者守护': 'シニアガード',
        '单点抓拍': '歩行者キャプチャ'
      }
    };
    if (this.lang === 'zh') return zhName;
    return (map[this.lang] && map[this.lang][zhName]) || zhName;
  },
  formatDate(timestamp) {
    const d = new Date(timestamp);
    if (this.lang === 'en') {
      const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
      return months[d.getMonth()] + ' ' + d.getDate() + ', ' + d.getFullYear();
    } else if (this.lang === 'zh') {
      return d.getFullYear() + '年' + (d.getMonth()+1) + '月' + d.getDate() + '日';
    } else {
      return d.getFullYear() + '年' + (d.getMonth()+1) + '月' + d.getDate() + '日';
    }
  },
  formatDateTime(timestamp) {
    const d = new Date(timestamp);
    const dateStr = this.formatDate(timestamp);
    const h = String(d.getHours()).padStart(2,'0');
    const m = String(d.getMinutes()).padStart(2,'0');
    return dateStr + ' ' + h + ':' + m;
  },
  fiatEstimate(usdc) {
    if (this.lang === 'zh') return '≈ ¥' + (usdc * this.rates.CNY).toFixed(0) + ' CNY';
    if (this.lang === 'ja') return '≈ ¥' + (usdc * this.rates.JPY).toFixed(0) + ' JPY';
    return '≈ $' + usdc.toFixed(2) + ' USD';
  },
  shortAddr(addr) {
    if (!addr || addr.length < 12) return addr;
    return addr.slice(0,6) + '...' + addr.slice(-4);
  }
};

// ========== Language Switching ==========
function toggleLangDropdown() {
  document.getElementById('lang-dropdown').classList.toggle('active');
}

function toggleMobileMenu() {
  var menu = document.getElementById('nav-mobile-menu');
  var toggle = document.querySelector('.nav-mobile-toggle');
  var isOpen = menu.classList.toggle('open');
  if (toggle) toggle.setAttribute('aria-expanded', String(isOpen));
}

function switchLang(lang) {
  i18n.lang = lang;
  localStorage.setItem('daix-lang', lang);
  document.documentElement.lang = lang === 'zh' ? 'zh-CN' : lang === 'ja' ? 'ja-JP' : 'en';
  document.getElementById('lang-current').textContent = lang.toUpperCase();
  document.getElementById('lang-dropdown').classList.remove('active');
  applyI18n();
  // Refresh dynamic content
  if (typeof loadAppsFromChain === 'function' && readOnlyContracts.AppRegistry) loadAppsFromChain();
  if (myLicenses.length > 0) updateMyLicenses();
}

function isAddress(value) {
  return /^0x[a-fA-F0-9]{40}$/.test(value || '');
}

function createContract(name, abi, runner) {
  var address = CONTRACT_CONFIG.contracts[name];
  if (!isAddress(address)) {
    console.warn('Missing or invalid contract address:', name);
    return null;
  }
  return new ethers.Contract(address, abi, runner);
}

// ========== IPFS Upload ==========
// Uses self-hosted IPFS cluster (5 nodes: US/JP/SG/KR/TH)
// Upload via daix.fun API → pinned on all nodes → CID written to chain
// ========== IPFS Upload via StarStack (5-node cluster) ==========
var STARSTACK_API = 'https://starstack.store';
var STARSTACK_GATEWAY = 'https://starstack.store/ipfs/';
var DAIX_GATEWAY = 'https://daix.fun/ipfs/';

async function uploadToIPFS(file, onProgress) {
  var formData = new FormData();
  formData.append('file', file);
  var xhr = new XMLHttpRequest();
  xhr.open('POST', STARSTACK_API + '/api/ipfs-upload');
  return new Promise(function(resolve, reject) {
    xhr.upload.onprogress = function(e) {
      if (e.lengthComputable && onProgress) {
        var pct = Math.round(e.loaded / e.total * 100);
        onProgress(pct);
      }
    };
    xhr.onload = function() {
      if (xhr.status >= 200 && xhr.status < 300) {
        try {
          var data = JSON.parse(xhr.responseText);
          // Pinned to 5 nodes via StarStack Cluster
          resolve('ipfs://' + data.cid);
        } catch(e) { reject(new Error('Parse error: ' + e.message)); }
      } else {
        reject(new Error('IPFS upload failed: ' + xhr.status + ' ' + xhr.responseText.slice(0,100)));
      }
    };
    xhr.onerror = function() {
      // Fallback to daix.fun API
      console.log('StarStack upload failed, falling back to daix.fun API...');
      fetch('https://daix.fun/api/ipfs-upload', { method: 'POST', body: formData })
        .then(function(r) { return r.ok ? r.json() : Promise.reject(new Error('Fallback failed: ' + r.status)); })
        .then(function(d) { resolve('ipfs://' + d.cid); })
        .catch(function(e) { reject(e); });
    };
    xhr.send(formData);
  });
}

function resolveIPFS(uri) {
  if (!uri || uri === '') return '';
  if (uri.startsWith('ipfs://')) {
    var cid = uri.slice(7);
    // Validate CID: Qm... (46 chars) or bafy... (59 chars)
    if (!/^(Qm[1-9A-HJ-NP-Za-km-z]{44}|bafy[a-zA-Z0-9]{55,})$/.test(cid)) {
      console.warn('Invalid CID, falling back to APP_DOWNLOADS:', cid);
      return '';
    }
    return STARSTACK_GATEWAY + cid;
  }
  if (uri.startsWith('https://') || uri.startsWith('http://')) return uri;
  return '';
}

function init() {
  // Load language preference: localStorage > browser lang > default 'en'
  var savedLang = localStorage.getItem('daix-lang');
  if (savedLang && i18n.dicts[savedLang]) {
    i18n.lang = savedLang;
  } else {
    var browserLang = (navigator.language || navigator.userLanguage || 'en').toLowerCase();
    if (browserLang.startsWith('zh')) i18n.lang = 'zh';
    else if (browserLang.startsWith('ja')) i18n.lang = 'ja';
    else i18n.lang = 'en';
  }
  document.documentElement.lang = i18n.lang === 'zh' ? 'zh-CN' : i18n.lang === 'ja' ? 'ja-JP' : 'en';
  document.getElementById('lang-current').textContent = i18n.lang.toUpperCase();
  applyI18n();

  try {
    readOnlyProvider = new ethers.JsonRpcProvider(CONTRACT_CONFIG.rpcUrl);
    readOnlyContracts = {
      AppRegistry: createContract('AppRegistry', ABIS.AppRegistry, readOnlyProvider),
      DeveloperRegistry: createContract('DeveloperRegistry', ABIS.DeveloperRegistry, readOnlyProvider),
      LicenseNFT: createContract('LicenseNFT', ABIS.LicenseNFT, readOnlyProvider),
      PromoterRegistry: createContract('PromoterRegistry', ABIS.PromoterRegistry, readOnlyProvider),
      LicenseQuery: createContract('LicenseQuery', ABIS.LicenseQuery, readOnlyProvider),
    };
    loadAppsFromChain();
    loadStatsFromChain();
  } catch (err) {
    console.error('Failed to initialize read-only contracts:', err);
    var list = document.getElementById('apps-list');
    if (list) list.innerHTML = '<p style="text-align:center;color:var(--text-3)">Unable to load on-chain apps. Please refresh later.</p>';
  }
  // Parse referral agent from URL
  var urlParams = new URLSearchParams(window.location.search);
  var agentParam = urlParams.get('agent');
  if (agentParam && /^0x[a-fA-F0-9]{40}$/.test(agentParam)) {
    referrerAddress = agentParam;
  }
}

// ========== Wallet Connection ==========
async function connectWallet() {
  if (typeof window.ethereum === 'undefined') {
    showToast(i18n.t('toast.install'));
    return;
  }
  try {
    var accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
    account = accounts[0];
    var chainId = await window.ethereum.request({ method: 'eth_chainId' });
    if (chainId !== CONTRACT_CONFIG.chainId) {
      try {
        await window.ethereum.request({ method: 'wallet_switchEthereumChain', params: [{ chainId: CONTRACT_CONFIG.chainId }] });
      } catch (e) {
        await window.ethereum.request({ method: 'wallet_addEthereumChain', params: [{
          chainId: CONTRACT_CONFIG.chainId, chainName: CONTRACT_CONFIG.chainName,
          rpcUrls: [CONTRACT_CONFIG.rpcUrl], blockExplorerUrls: [CONTRACT_CONFIG.explorer],
          nativeCurrency: { name: 'POL', symbol: 'POL', decimals: 18 }
        }]});
      }
    }
    provider = new ethers.BrowserProvider(window.ethereum);
    signer = await provider.getSigner();
    contracts.DeveloperRegistry = createContract('DeveloperRegistry', ABIS.DeveloperRegistry, signer);
    contracts.AppRegistry = createContract('AppRegistry', ABIS.AppRegistry, signer);
    contracts.LicenseNFT = createContract('LicenseNFT', ABIS.LicenseNFT, signer);
    contracts.PromoterRegistry = createContract('PromoterRegistry', ABIS.PromoterRegistry, signer);
    contracts.LicenseQuery = createContract('LicenseQuery', ABIS.LicenseQuery, signer);
    if (!contracts.DeveloperRegistry || !contracts.AppRegistry || !contracts.LicenseNFT || !contracts.PromoterRegistry || !contracts.LicenseQuery) {
      throw new Error('One or more contract addresses are not configured');
    }

    try {
      isRegisteredDev = await contracts.DeveloperRegistry.isRegistered(account);
      if (isRegisteredDev) {
        document.getElementById('btn-register-app').disabled = false;
        await loadDevDashboard();
      }
    } catch(e) {}

    await loadMyLicenses();
    await checkPromoterStatus();
    updateWalletUI();
    showToast(i18n.t('toast.connected'));
  } catch (err) {
    showToast(i18n.t('toast.connect.fail') + err.message, 'error');
  }
}

function updateWalletUI() {

  var short = i18n.shortAddr(account);

async function loadMyLicenses() {
  if (!account || !contracts.LicenseNFT) return;
  try {
    var balance = await contracts.LicenseNFT.balanceOf(account);
    var count = Number(balance);
    myLicenses = [];
    for (var idx = 0; idx < count; idx++) {
      var tokenId = await contracts.LicenseNFT.tokenOfOwnerByIndex(account, idx);
      var tid = Number(tokenId);
      var lic = await contracts.LicenseNFT.licenses(tid);
      var app = await readOnlyContracts.AppRegistry.apps(Number(lic.appId));
      myLicenses.push({
        tokenId: tid,
        appId: Number(lic.appId),
        appName: i18n.appName(app.name),
        appIcon: APP_ICONS[app.packageName] || '📦',
        code: 'NFT-' + tid.toString(16).toUpperCase().padStart(6,'0'),
        purchasedAt: i18n.formatDateTime(Number(lic.mintedAt) * 1000),
        active: lic.activated
      });
    }
    updateMyLicenses();
  } catch(e) { console.error('loadMyLicenses:', e); }
}

      var approveTx = await usdcContract.approve(CONTRACT_CONFIG.contracts.LicenseNFT, price);
      updateModal('<div class="tx-status pending">⏳ Approving USDC... TX: ' + approveTx.hash.slice(0,20) + '...</div>');
      await approveTx.wait();

    updateModal('<div class="tx-status pending">' + i18n.t('modal.buy.tx.sent') + tx.hash.slice(0,20) + '...</div>');

      i18n.t('modal.buy.success') + '<br><br>' +

      '<div class="tx-status pending">⏳ Step 1/2: Approving USDC...</div>');

    // Step 1: Approve
    var usdcContract = new ethers.Contract(CONTRACT_CONFIG.contracts.USDC, ABIS.USDC, signer);
    var currentAllowance = await usdcContract.allowance(account, CONTRACT_CONFIG.contracts.LicenseNFT);
    if (BigInt(currentAllowance) < BigInt(totalCost)) {
      var approveTx = await usdcContract.approve(CONTRACT_CONFIG.contracts.LicenseNFT, totalCost);
      updateModal('<div class="tx-status pending">⏳ Approving USDC... TX: ' + approveTx.hash.slice(0,20) + '...</div>');
      await approveTx.wait();
    }

    // Step 2: Batch Mint
    updateModal('<div class="tx-status pending">⏳ Step 2/2: Minting ' + qty + ' licenses...</div>');
    var tx = await contracts.LicenseNFT.batchMint(appId, qty);
    updateModal('<div class="tx-status pending">' + (i18n.t('modal.buy.tx.sent') || 'TX sent: ') + tx.hash.slice(0,20) + '...</div>');
    await tx.wait();
    updateModal('<div class="tx-status success">' +
      (i18n.t('modal.batch.success') || '✅ Batch purchase successful!') + '<br><br>' +
      '<strong>' + (i18n.t('modal.batch.count') || 'Licenses') + ':</strong> ' + qty + '<br>' +
      '<strong>' + (i18n.t('modal.buy.app.label') || 'App') + ':</strong> ' + displayName + '<br>' +
      '<strong>TX:</strong> <a href="' + CONTRACT_CONFIG.explorer + '/tx/' + tx.hash + '" target="_blank" style="color:var(--accent-2)">' + (i18n.t('modal.buy.view') || 'View') + '</a></div>');
    await loadMyLicenses();
    await loadStatsFromChain();
  } catch (err) {
    updateModal('<div class="tx-status error">' + (i18n.t('modal.fail') || 'Failed: ') + err.message.slice(0,100) + '</div>');
  }
}

function copyLicenseCode(code, btn) {
  navigator.clipboard.writeText(code).then(function() {
    var orig = btn.textContent;
    btn.textContent = '✅ ' + i18n.t('my.licenses.copied');
    setTimeout(function() { btn.textContent = orig; }, 2000);
  });
}

// ========== Register App ==========
async function registerApp() {
  if (!isRegisteredDev) { showToast(i18n.t('toast.register.first')); return; }
  if (!contracts.AppRegistry) { showToast(i18n.t('toast.connect.first')); return; }
  var name = document.getElementById('app-name').value.trim();
  var pkg = document.getElementById('app-pkg').value.trim();
  if (!name || !pkg) { showToast(i18n.t('toast.fill.fields')); return; }
  var desc = document.getElementById('app-desc').value.trim();
  var price = document.getElementById('app-price').value || '0';
  var trial = parseInt(document.getElementById('app-trial').value) || 7;
  var version = document.getElementById('app-version') ? document.getElementById('app-version').value.trim() : 'v1.0.0';
  var apkURI = '';
  var iconURI = '';
  try {
    // Step 1: Upload APK to StarStack
    var apkFile = document.getElementById('app-apk-file').files[0];
    if (apkFile) {
      showModal(i18n.t('modal.pub.title'), '<div class="tx-status pending">📦 ' + (i18n.t('apk.uploading') || 'Uploading APK to IPFS...') + '<br><div id="upload-pct" style="margin-top:8px;font-size:13px">0%</div><div style="width:100%;height:4px;background:var(--bg-2);border-radius:2px;margin-top:4px"><div id="upload-bar" style="width:0%;height:100%;background:var(--accent-2);border-radius:2px;transition:width 0.3s"></div></div></div>');
      try {
        apkURI = await uploadToIPFS(apkFile, function(pct) {
          var bar = document.getElementById('upload-bar');
          var txt = document.getElementById('upload-pct');
          if (bar) bar.style.width = pct + '%';
          if (txt) txt.textContent = pct + '%';
        });
      } catch(uploadErr) {
        updateModal('<div class="tx-status error">IPFS upload failed: ' + uploadErr.message.slice(0,80) + '<br><span style="font-size:12px;color:var(--text-3)">' + (i18n.t('apk.upload.fail.hint') || 'You can skip APK upload and publish metadata only, then update later.') + '</span></div>');
        return;
      }
    }
    // Step 2: Upload Icon to StarStack
    var iconFile = document.getElementById('app-icon-file').files[0];
    if (iconFile) {
      updateModal(i18n.t('modal.pub.title'), '<div class="tx-status pending">🖼️ ' + (i18n.t('icon.uploading') || 'Uploading icon to IPFS...') + '</div>');
      try {
        iconURI = await uploadToIPFS(iconFile);
      } catch(e) { console.log('Icon upload failed:', e.message); }
    }
    // Step 3: Upload Screenshots to StarStack (append CIDs to description)
    var screenshotFiles = document.getElementById('app-screenshot-files').files;
    if (screenshotFiles.length > 0) {
      updateModal(i18n.t('modal.pub.title'), '<div class="tx-status pending">📸 ' + (i18n.t('screenshot.uploading') || 'Uploading screenshots to IPFS...') + ' (0/' + screenshotFiles.length + ')</div>');
      var shotCIDs = [];
      for (var i = 0; i < screenshotFiles.length; i++) {
        try {
          var shotURI = await uploadToIPFS(screenshotFiles[i]);
          shotCIDs.push(shotURI);
          updateModal(i18n.t('modal.pub.title'), '<div class="tx-status pending">📸 ' + (i18n.t('screenshot.uploading') || 'Uploading screenshots to IPFS...') + ' (' + (i+1) + '/' + screenshotFiles.length + ')</div>');
        } catch(e) { console.log('Screenshot ' + i + ' upload failed:', e.message); }
      }
      if (shotCIDs.length > 0) {
        desc = desc + '\n\n[Screenshots]\n' + shotCIDs.map(function(u) { return resolveIPFS(u); }).join('\n');
      }
    }
    // Step 4: Register on-chain
    updateModal(i18n.t('modal.pub.title'), '<div class="tx-status pending">✅ IPFS uploads complete!' + (apkURI ? '<br>APK: ' + apkURI.slice(0,30) + '...' : '') + (iconURI ? '<br>Icon: ' + iconURI.slice(0,30) + '...' : '') + '<br>' + (i18n.t('modal.pub.sending') || '⏳ Sending transaction...') + '</div>');
    var tx = await contracts.AppRegistry.registerApp(name, pkg, desc, apkURI, iconURI, ethers.parseUnits(price, 6), trial, version);
    updateModal('<div class="tx-status pending">' + i18n.t('modal.pub.confirming') + '<br><a href="' + CONTRACT_CONFIG.explorer + '/tx/' + tx.hash + '" target="_blank" style="color:var(--accent-2)">' + i18n.t('modal.pub.view.tx') + '</a></div>');
    await tx.wait();
    updateModal('<div class="tx-status success">' + i18n.t('modal.pub.success') + '<br><br><strong>' + name + '</strong> ' + i18n.t('modal.pub.joined') + '<br>' + i18n.t('modal.pub.identifier') + ': ' + pkg + '<br>' + i18n.t('modal.pub.price') + ': ' + price + ' USDC<br><br><span style="font-size:12px;color:var(--text-3)">🌐 Stored on StarStack 5-node IPFS Cluster (SG/US/JP/KR/TH)</span></div>');
    await loadAppsFromChain();
    await loadStatsFromChain();
  } catch (err) {
    updateModal('<div class="tx-status error">' + i18n.t('modal.fail') + err.message.slice(0,100) + '</div>');
  }
}

          '<div style="font-size:12px;color:var(--text-3);font-family:monospace">' + escapeHtml(app.packageName) + '</div>' +
          '<div style="font-size:14px;color:var(--accent-2);font-weight:600;margin-top:4px">' + priceUsdc + ' USDC <span style="font-size:11px;color:var(--text-3)">' + i18n.fiatEstimate(priceUsdc) + '</span></div>' +
        '</div>' +
        '<div style="display:flex;gap:8px;align-items:center">' +
          (app.active ? '<span style="color:var(--green);font-size:13px">✅ ' + i18n.t('dev.app.active') + '</span>' : '<span style="color:var(--red);font-size:13px">❌ ' + i18n.t('dev.app.inactive') + '</span>') +
          '<button class="btn btn-small btn-outline" onclick="updateAppPrice(' + appId + ',\'' + escapeHtml(app.name) + '\')">' + i18n.t('dev.app.update') + '</button>' +
          '<button class="btn btn-small btn-outline" onclick="updateAppApk(' + appId + ',\'' + escapeHtml(app.name) + '\')">📦 APK</button>' +
          (app.active ? '<button class="btn btn-small" style="color:var(--red);border-color:var(--red)" onclick="deactivateApp(' + appId + ',\'' + escapeHtml(app.name) + '\')">' + i18n.t('dev.app.deactivate') + '</button>' : '') +

async function updateAppApk(appId, appName) {
  var fileInput = document.createElement('input');
  fileInput.type = 'file';
  fileInput.accept = '.apk,.aab,.zip,.ipa,.dmg,.exe,.deb,.AppImage';
  fileInput.onchange = async function() {
    var file = fileInput.files[0];
    if (!file) return;
    showModal((i18n.t('apk.uploading') || '📦 Uploading to IPFS...'), '<div class="tx-status pending">📦 ' + (i18n.t('apk.uploading') || 'Uploading APK to IPFS...') + '</div>');
    try {
      var apkURI = await uploadToIPFS(file);
      updateModal((i18n.t('apk.uploading') || 'Updating APK...'), '<div class="tx-status pending">✅ IPFS: ' + apkURI.slice(0,30) + '...<br>⏳ Updating on-chain...</div>');
      var currentApp = await readOnlyContracts.AppRegistry.getApp(appId);
      var tx = await contracts.AppRegistry.updateApp(appId, currentApp.version, apkURI, currentApp.price);
      await tx.wait();
      updateModal('<div class="tx-status success">✅ APK Updated!<br><br><strong>' + appName + '</strong><br>IPFS: ' + apkURI.slice(0,40) + '...<br><a href="' + resolveIPFS(apkURI) + '" target="_blank" style="color:var(--accent-2)">Download Link</a></div>');

      updateModal('<div class="tx-status error">' + (i18n.t('modal.fail') || 'Failed: ') + err.message.slice(0,100) + '</div>');
    }
  };
  fileInput.click();
}

    }
  } catch (err) {
    console.error('Failed to check promoter status:', err);
  }
}

function copyPromoterLink(btn) {
  var input = btn.parentElement.querySelector('input');
  if (input) {
    navigator.clipboard.writeText(input.value).then(function() {
      btn.textContent = i18n.t('promoter.info.copied');
      setTimeout(function() { btn.textContent = i18n.t('promoter.info.copy'); }, 2000);
    });
  }
}

async function registerPromoter() {
  if (!account) { showToast(i18n.t('toast.connect.first')); return; }
  if (!contracts.PromoterRegistry) { showToast(i18n.t('toast.connect.first')); return; }
  var name = document.getElementById('promoter-name').value.trim();
  var code = document.getElementById('promoter-code').value.trim();
  if (!name) { showToast(i18n.t('toast.enter.name')); return; }
  if (!code) { showToast(i18n.t('promoter.toast.enter.code')); return; }
  try {
    showModal(i18n.t('promoter.modal.title'), '<div class="tx-status pending">' + i18n.t('promoter.modal.sending') + '</div>');
    var tx = await contracts.PromoterRegistry.register(name, code);
    updateModal('<div class="tx-status pending">' + i18n.t('promoter.modal.confirming') + '<br><a href="' + CONTRACT_CONFIG.explorer + '/tx/' + tx.hash + '" target="_blank" style="color:var(--accent-2)">' + i18n.t('promoter.modal.view.tx') + '</a></div>');
    await tx.wait();
    updateModal('<div class="tx-status success">' + i18n.t('promoter.modal.success') + '<br><br><strong>' + i18n.t('promoter.modal.name') + ':</strong> ' + escapeHtml(name) + '<br><strong>' + i18n.t('promoter.modal.code') + ':</strong> ' + escapeHtml(code) + '</div>');
    await checkPromoterStatus();
  } catch (err) {
    var msg = err.message || String(err);
    if (msg.includes('already taken')) {
      updateModal('<div class="tx-status error">' + i18n.t('promoter.toast.code.taken') + '</div>');
    } else {
      updateModal('<div class="tx-status error">' + i18n.t('modal.fail') + msg.slice(0, 100) + '</div>');
    }
  }
}

// ========== Utils ==========
function showToast(msg, type='info') {
  var t = document.createElement('div');
  t.className = 'toast';
  t.textContent = msg;
  if (type === 'error') { t.style.borderColor = 'var(--red)'; t.style.color = 'var(--red)'; }
  document.body.appendChild(t);
  setTimeout(function() { t.remove(); }, 3000);
}
function showModal(title, body) {
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-body').innerHTML = body;
  document.getElementById('modal-overlay').classList.add('active');
}
function updateModal(body) { document.getElementById('modal-body').innerHTML = body; }
function closeModal() { document.getElementById('modal-overlay').classList.remove('active'); }
</script>
